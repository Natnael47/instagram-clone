# .github/workflows/ci-cd.yml
# Instagram Clone - Server CI/CD Pipeline
# Location: instagram-clone/.github/workflows/ci-cd.yml
# Working directory: ./server (where package.json lives)

name: Server CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "server/**" # Only trigger on server changes
  pull_request:
    branches: [main]
    paths:
      - "server/**"

env:
  NODE_ENV: test

jobs:
  # ============================================
  # JOB 1: CODE QUALITY
  # ============================================
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install

      - name: 🔍 Run ESLint
        run: bun run lint:check

      - name: 🔎 TypeScript type check
        run: bun run type-check

  # ============================================
  # JOB 2: UNIT TESTS (No database needed)
  # ============================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install

      - name: 🧪 Run unit tests
        run: bun test tests/unit
        env:
          JWT_SECRET: test-secret-key-that-is-at-least-32-characters-long!!
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 30d
          MONGODB_URI: mongodb://localhost:27017/instagram-clone-test
          CLIENT_URL: http://localhost:19000
          LOG_LEVEL: error
          NODE_ENV: test

  # ============================================
  # JOB 3: INTEGRATION + E2E TESTS (Needs MongoDB)
  # ============================================
  integration-tests:
    name: 🔗 Integration & E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install

      - name: ⏳ Wait for MongoDB
        run: |
          echo "Waiting for MongoDB to be ready..."
          sleep 5

      - name: 🧪 Run integration tests
        run: bun test tests/integration
        env:
          JWT_SECRET: test-secret-key-that-is-at-least-32-characters-long!!
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 30d
          MONGODB_URI: mongodb://localhost:27017/instagram-clone-test
          CLIENT_URL: http://localhost:19000
          LOG_LEVEL: error
          NODE_ENV: test
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test

      - name: 🧪 Run E2E tests
        run: bun test tests/e2e
        env:
          JWT_SECRET: test-secret-key-that-is-at-least-32-characters-long!!
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 30d
          MONGODB_URI: mongodb://localhost:27017/instagram-clone-test
          CLIENT_URL: http://localhost:19000
          LOG_LEVEL: error
          NODE_ENV: test
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test

  # ============================================
  # JOB 4: BUILD (Only after all tests pass)
  # ============================================
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, integration-tests]
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install

      - name: 🏗️ Build TypeScript
        run: bun run build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: server/dist/
          retention-days: 7

